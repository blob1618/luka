services:
  - type: web
    name: luka-web
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    envVars:
      - key: TZ
        value: America/Argentina/Buenos_Aires
      - key: DATABASE_URL
        value: $DATABASE_URL
      - key: WHATSAPP_VERIFY_TOKEN
        value: $WHATSAPP_VERIFY_TOKEN
